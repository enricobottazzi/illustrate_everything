<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sample Illustration</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0a0a0a;
    color: #e0e0e0;
    font-family: 'Georgia', serif;
  }
  .container {
    text-align: center;
    padding: 2rem;
  }
  h1 { font-size: 2.5rem; margin-bottom: 1rem; letter-spacing: -0.02em; }
  p { font-size: 1.1rem; opacity: 0.6; }
  svg { margin: 2rem auto; display: block; }
  .back {
    display: inline-block;
    margin-top: 2rem;
    color: #888;
    text-decoration: none;
    font-size: 0.9rem;
    border-bottom: 1px solid #333;
    padding-bottom: 2px;
    transition: color 0.2s;
  }
  .back:hover { color: #fff; border-color: #fff; }
</style>
</head>
<body>
<div class="container">
  <h1>Hello, World</h1>
  <svg width="200" height="200" viewBox="0 0 200 200">
    <circle cx="100" cy="100" r="80" fill="none" stroke="#444" stroke-width="1"/>
    <circle cx="100" cy="100" r="60" fill="none" stroke="#555" stroke-width="1"/>
    <circle cx="100" cy="100" r="40" fill="none" stroke="#666" stroke-width="1"/>
    <circle cx="100" cy="100" r="4" fill="#fff"/>
  </svg>
  <p>Replace this with your first real illustration.</p>
  <a href="../" class="back">&larr; Back to gallery</a>
</div>
</body>
</html>
