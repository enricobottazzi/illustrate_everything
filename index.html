<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Illustrate Everything</title>
<style>
  body { background: #000; color: #ccc; font-family: monospace; max-width: 640px; margin: 0 auto; padding: 3rem 1.5rem; line-height: 1.7; }
  a { color: #888; }
  a:hover { color: #fff; }
  h1 { color: #fff; font-size: 1.4rem; margin-bottom: 0.5rem; }
  p { margin-bottom: 2rem; color: #666; }
  ul { list-style: none; padding: 0; }
  li { margin-bottom: 0.5rem; }
  li a { text-decoration: none; }
  li a:before { content: "→ "; color: #444; }
</style>
</head>
<body>
<h1>Illustrate Everything</h1>
<p>Interactive illustrations built with Claude.</p>
<ul id="list"></ul>
<script>
  fetch('manifest.json').then(r=>r.json()).then(items=>{
    document.getElementById('list').innerHTML = items.map(i =>
      '<li><a href="'+i.file+'">'+i.title+'</a></li>'
    ).join('');
  });
</script>
</body>
</html>
