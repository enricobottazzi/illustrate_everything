<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Illustrate Everything</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #060606;
    --surface: #0e0e0e;
    --border: #1a1a1a;
    --text: #d4d4d4;
    --text-dim: #666;
    --accent: #c8a46e;
    --accent-dim: rgba(200, 164, 110, 0.08);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  .grain {
    position: fixed;
    inset: 0;
    pointer-events: none;
    opacity: 0.03;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 256px;
    z-index: 9999;
  }

  header {
    padding: 4rem 2rem 3rem;
    max-width: 900px;
    margin: 0 auto;
    border-bottom: 1px solid var(--border);
  }

  header h1 {
    font-family: 'Instrument Serif', serif;
    font-weight: 400;
    font-size: clamp(2.8rem, 6vw, 4.5rem);
    letter-spacing: -0.03em;
    line-height: 1.05;
    color: #f0f0f0;
  }

  header h1 em {
    font-style: italic;
    color: var(--accent);
  }

  header p {
    margin-top: 1rem;
    font-size: 0.95rem;
    color: var(--text-dim);
    max-width: 440px;
    line-height: 1.6;
  }

  .count {
    display: inline-block;
    margin-top: 1.2rem;
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--text-dim);
    font-weight: 500;
  }

  .gallery {
    max-width: 900px;
    margin: 0 auto;
    padding: 1.5rem 2rem 6rem;
  }

  .gallery a {
    display: grid;
    grid-template-columns: 3.5rem 1fr auto;
    align-items: baseline;
    gap: 1.5rem;
    padding: 1.4rem 0;
    border-bottom: 1px solid var(--border);
    text-decoration: none;
    color: inherit;
    transition: background 0.2s;
    position: relative;
  }

  .gallery a::before {
    content: '';
    position: absolute;
    inset: 0 -1.5rem;
    border-radius: 6px;
    background: var(--accent-dim);
    opacity: 0;
    transition: opacity 0.25s;
    z-index: -1;
  }

  .gallery a:hover::before { opacity: 1; }

  .gallery a:hover .item-title { color: var(--accent); }

  .item-num {
    font-family: 'Instrument Serif', serif;
    font-size: 1.1rem;
    color: var(--text-dim);
    text-align: right;
    padding-right: 0.5rem;
    border-right: 1px solid var(--border);
  }

  .item-body { min-width: 0; }

  .item-title {
    font-family: 'Instrument Serif', serif;
    font-size: 1.35rem;
    font-weight: 400;
    letter-spacing: -0.01em;
    color: #e8e8e8;
    transition: color 0.2s;
    line-height: 1.3;
  }

  .item-desc {
    margin-top: 0.3rem;
    font-size: 0.82rem;
    color: var(--text-dim);
    line-height: 1.5;
  }

  .item-date {
    font-size: 0.75rem;
    color: var(--text-dim);
    white-space: nowrap;
    font-variant-numeric: tabular-nums;
  }

  .empty {
    text-align: center;
    padding: 5rem 2rem;
    color: var(--text-dim);
    font-size: 0.95rem;
  }

  .loading {
    text-align: center;
    padding: 4rem 2rem;
    color: var(--text-dim);
    font-size: 0.85rem;
    letter-spacing: 0.05em;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .gallery a {
    animation: fadeUp 0.4s ease both;
  }

  @media (max-width: 600px) {
    header { padding: 3rem 1.5rem 2rem; }
    .gallery { padding: 1rem 1.5rem 4rem; }
    .gallery a { grid-template-columns: 2.5rem 1fr; gap: 1rem; }
    .item-date { display: none; }
  }
</style>
</head>
<body>

<div class="grain"></div>

<header>
  <h1>Illustrate <em>Everything</em></h1>
  <p>Interactive illustrations built with Claude, deployed in one push.</p>
  <span class="count" id="count"></span>
</header>

<div class="gallery" id="gallery">
  <div class="loading">Loading&hellip;</div>
</div>

<script>
(async () => {
  const gallery = document.getElementById('gallery');
  const count = document.getElementById('count');

  try {
    const res = await fetch('manifest.json');
    if (!res.ok) throw new Error('manifest not found');
    const items = await res.json();

    if (!items.length) {
      gallery.innerHTML = '<div class="empty">No illustrations yet. Push your first one!</div>';
      return;
    }

    count.textContent = `${items.length} illustration${items.length === 1 ? '' : 's'}`;

    gallery.innerHTML = items
      .sort((a, b) => (b.date || '').localeCompare(a.date || ''))
      .map((item, i, arr) => {
        const num = String(arr.length - i).padStart(2, '0');
        const date = item.date ? new Date(item.date + 'T00:00:00').toLocaleDateString('en-GB', {
          day: 'numeric', month: 'short', year: 'numeric'
        }) : '';
        return `
          <a href="${item.file}" style="animation-delay: ${i * 0.05}s">
            <span class="item-num">${num}</span>
            <div class="item-body">
              <div class="item-title">${item.title}</div>
              ${item.description ? `<div class="item-desc">${item.description}</div>` : ''}
            </div>
            <span class="item-date">${date}</span>
          </a>`;
      })
      .join('');

  } catch (e) {
    gallery.innerHTML = '<div class="empty">Could not load manifest.json</div>';
    console.error(e);
  }
})();
</script>
</body>
</html>
